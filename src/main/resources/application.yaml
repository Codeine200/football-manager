server:
    port: 8080

spring:
    application:
        name: FootballManager
    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 5MB
    datasource:
        url: jdbc:postgresql://localhost:5432/football_manager
        username: football_admin
        password: secret
        driver-class-name: org.postgresql.Driver

    jpa:
        open-in-view: false
        properties:
            hibernate:
                default_schema: football
                format_sql: true
                jdbc:
                    lob:
                        non_contextual_creation: true
                type:
                    descriptor: trace
        hibernate:
            ddl-auto: validate
        show-sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect

    flyway:
        schemas: football

    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=500,expireAfterWrite=10m

jwt:
    secret: verySecretKeyverySecretKeyverySecretKeyverySecretKey
    expiration: 86400000

uploads:
    teams-photos-folder: ${UPLOADS_TEAMS_PHOTOS_FOLDER:/home/codeine/football-manager/uploads/teams}
    players-photos-folder: ${UPLOADS_PLAYERS_PHOTOS_FOLDER:/home/codeine/football-manager/uploads/players}

cors:
    allowed-origins:
        - http://localhost:5173
        - http://localhost:3000